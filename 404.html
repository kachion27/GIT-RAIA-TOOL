<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>404 - Không tìm thấy trang | 27NetTeam X RAIA RIKKEI</title>
    <meta name="title" content="404 - Không tìm thấy trang">
    
    <link rel="shortcut icon" href="/img/icon.ico" type="image/x-icon">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <!-- Cursor Glow -->
    <div id="cursor-glow" aria-hidden="true"></div>
    <canvas id="particles-canvas" aria-hidden="true"></canvas>

    <div class="app-container" style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
        <main class="main-content" style="text-align: center; max-width: 600px;">
            <section class="glass-card section-card reveal">
                <div class="logo-icon" style="margin: 0 auto 20px; width: 100px; height: 100px;">
                    <img src="/img/icon.png" alt="27 NetTeam Logo" style="width: 100%; height: 100%; object-fit: contain; border-radius: 25%;">
                </div>
                <h1 class="section-title text-glow" style="font-size: 5rem; margin-bottom: 10px; color: var(--neon-pink);">404</h1>
                <h2 class="text-glow" style="font-size: 1.5rem; margin-bottom: 20px;">Trang không tồn tại</h2>
                <p style="color: var(--text-light); margin-bottom: 20px;">
                    Có vẻ như bạn đã truy cập vào một đường dẫn không hợp lệ. Vui lòng quay lại trang chủ để tiếp tục sử dụng công cụ Git Upload.
                </p>
                <p style="color: var(--neon-pink); font-size: 1.1rem; margin-bottom: 30px; font-weight: 600;">
                    Tự động chuyển về trang chủ sau <span id="countdown">10</span> giây...
                </p>
                <div class="action-container">
                    <a href="/" style="text-decoration: none;">
                        <button class="btn btn--glow btn--large">
                            🏠 Về Trang Chủ
                        </button>
                    </a>
                </div>
            </section>
        </main>
    </div>

    <!-- Scripts for animations -->
    <script>
        // Countdown and redirect
        let timeLeft = 10;
        const countdownEl = document.getElementById('countdown');
        const timer = setInterval(() => {
            timeLeft--;
            if (countdownEl) countdownEl.textContent = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(timer);
                window.location.href = '/';
            }
        }, 1000);

        // Cursor Glow
        const cursorGlow = document.getElementById('cursor-glow');
        if (cursorGlow) {
            document.addEventListener('mousemove', (e) => {
                cursorGlow.style.left = e.clientX + 'px';
                cursorGlow.style.top = e.clientY + 'px';
            });
        }

        // Particles Canvas
        const canvas = document.getElementById('particles-canvas');
        if (canvas) {
            const ctx = canvas.getContext('2d');
            let particles = [];

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 2 + 0.5;
                    this.speedX = Math.random() * 1 - 0.5;
                    this.speedY = Math.random() * 1 - 0.5;
                    this.color = Math.random() > 0.5 ? '#00f0ff' : '#a855f7';
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                    if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
                }
                draw() {
                    ctx.fillStyle = this.color;
                    ctx.globalAlpha = 0.3;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            function initParticles() {
                for (let i = 0; i < 50; i++) {
                    particles.push(new Particle());
                }
            }
            initParticles();

            function animateParticles() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = 0; i < particles.length; i++) {
                    particles[i].update();
                    particles[i].draw();
                }
                requestAnimationFrame(animateParticles);
            }
            animateParticles();
        }
    </script>
</body>
</html>
